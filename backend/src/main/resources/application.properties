spring.application.name=twilio-spa-fetch-backend

# Secrets are NOT committed: they come from environment variables or from an
# optional application-local.properties file at the project root (gitignored).
# See application-local.properties.example for a template.
spring.config.import=optional:file:./application-local.properties

# S3 Configuration
aws.s3.endpoint=${S3_ENDPOINT:http://localhost:8081}
aws.s3.access-key=${S3_ACCESS_KEY:}
aws.s3.secret-key=${S3_SECRET_KEY:}
aws.s3.region=${S3_REGION:us-east-1}
aws.s3.bucket-name=${S3_BUCKET_NAME:twilio-bucket}

# JWT Configuration
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
